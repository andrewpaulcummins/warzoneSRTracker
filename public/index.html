<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Rank Tracker</title>
    <style>
        body {
            background: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @font-face {
            font-family: 'Bord';
            src: url('fonts/Bord.ttf') format('ttf');
        }

        .container {
            position: relative;
            text-align: center;
        }

        .rank-image {
            width: 100%;
            max-width: 800px;
        }

        .sr-overlay,
        .daily-sr-overlay {
            position: absolute;
            top: 45%;
            font-family: 'Bord';
            font-weight: bold;
            font-size: 45px;
            text-shadow: 0 0 0.5px #fff;
            /* Backup for other browsers */
            color: #fff;
        }

        .sr-overlay {
            left: 42%;
        }

        .daily-sr-overlay {
            left: 67%;
        }

        /* Add styles for positive/negative dailySR */
        .positive-sr {
            color: limegreen;
        }

        .negative-sr {
            color: red;
        }
    </style>

    <script>
        const rankImages = {
            "Bronze 1": "gogzyImages/bronze1.png",
            "Bronze 2": "gogzyImages/bronze2.png",
            "Bronze 3": "gogzyImages/bronze3.png",
            "Silver 1": "gogzyImages/silver1.png",
            "Silver 2": "gogzyImages/silver2.png",
            "Silver 3": "gogzyImages/silver3.png",
            "Gold 1": "gogzyImages/gold1.png",
            "Gold 2": "gogzyImages/gold2.png",
            "Gold 3": "gogzyImages/gold3.png",
            "Platinum 1": "gogzyImages/platinum1.png",
            "Platinum 2": "gogzyImages/platinum2.png",
            "Platinum 3": "gogzyImages/platinum3.png",
            "Diamond 1": "gogzyImages/diamond1.png",
            "Diamond 2": "gogzyImages/diamond2.png",
            "Diamond 3": "gogzyImages/diamond3.png",
            "Crimson 1": "gogzyImages/crimson1.png",
            "Crimson 2": "gogzyImages/crimson2.png",
            "Crimson 3": "gogzyImages/crimson3.png",
            "Iridescent": "gogzyImages/iridescent.png"
        };

        async function fetchSRData() {
            const response = await fetch('/sr-data');
            const data = await response.json();

            // Check if rankImages contains the rank and update the rank image
            if (rankImages[data.rank]) {
                document.getElementById('rank-image').src = rankImages[data.rank];
            }

            // Ensure currentSR and dailySR are set correctly
            if (data.currentSR !== undefined) {
                document.getElementById('current-sr').innerText = data.currentSR;
            } else {
                document.getElementById('current-sr').innerText = '0'; // Fallback value
            }

            if (data.dailySR !== undefined) {
                const dailySRText = data.dailySR >= 0 ? `+${data.dailySR}` : data.dailySR;
                document.getElementById('daily-sr').innerText = dailySRText;

                // Apply color change based on positive/negative daily SR
                const dailySrElement = document.getElementById('daily-sr');
                if (data.dailySR >= 0) {
                    dailySrElement.classList.add('positive-sr');
                    dailySrElement.classList.remove('negative-sr');
                } else {
                    dailySrElement.classList.add('negative-sr');
                    dailySrElement.classList.remove('positive-sr');
                }
            } else {
                document.getElementById('daily-sr').innerText = '0'; // Fallback value
            }
        }

        let socket;
        function connectWebSocket() {
            // socket = new WebSocket('wss://warzonesrtracker-7g94.onrender.com');
            socket = new WebSocket('ws://localhost:3000');

            socket.onmessage = function (event) {
                const data = JSON.parse(event.data); // Parse incoming JSON data
                console.log(data.rank);
                if (rankImages[data.rank]) {
                    document.getElementById('rank-image').src = rankImages[data.rank];
                }
                document.getElementById('current-sr').innerText = data.currentSR;

                // Update dailySR with color changes for positive or negative values
                const dailySRText = data.dailySR >= 0 ? `+${data.dailySR}` : data.dailySR;
                document.getElementById('daily-sr').innerText = dailySRText;

                const dailySrElement = document.getElementById('daily-sr');
                if (data.dailySR >= 0) {
                    dailySrElement.classList.add('positive-sr');
                    dailySrElement.classList.remove('negative-sr');
                } else {
                    dailySrElement.classList.add('negative-sr');
                    dailySrElement.classList.remove('positive-sr');
                }
            };

            socket.onclose = () => {
                console.log('WebSocket closed, reconnecting...');
                setTimeout(connectWebSocket, 1000);  // Try to reconnect after 1 second
            };
        }
    </script>
</head>

<body>
    <div class="container">
        <img id="rank-image" class="rank-image" src="" alt="Rank Image">
        <div id="current-sr" class="sr-overlay">0</div>
        <div id="daily-sr" class="daily-sr-overlay">0</div>
    </div>
</body>

</html>
