<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Rank Tracker</title>
    <style>
        body {
            background: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @font-face {
            font-family: 'GOOD BRUSH';
            src: url('fonts/GOOD BRUSH.TTF') format('ttf');
        }

        .container {
            position: relative;
            text-align: center;
        }

        .rank-image {
            width: 100%;
            max-width: 800px;
        }

        .sr-overlay,
        .daily-sr-overlay {
            position: absolute;
            top: 43%;
            font-family: 'GOOD BRUSH';
            font-size: clamp(16px, 6.25vw, 50px);
            color: #F8DD73;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        .sr-overlay {
            left: 30%;
        }

        .daily-sr-overlay {
            left: 75%;
        }

        .positive-sr {
            color: limegreen;
        }

        .negative-sr {
            color: red;
        }
    </style>
    <script>
        const rankImages = {
            "Bronze 1": "images/bronze1.png",
            "Bronze 2": "images/bronze2.png",
            "Bronze 3": "images/bronze3.png",
            "Silver 1": "images/silver1.png",
            "Silver 2": "images/silver2.png",
            "Silver 3": "images/silver3.png",
            "Gold 1": "images/gold1.png",
            "Gold 2": "images/gold2.png",
            "Gold 3": "images/gold3.png",
            "Platinum 1": "images/platinum1.png",
            "Platinum 2": "images/platinum2.png",
            "Platinum 3": "images/platinum3.png",
            "Diamond 1": "images/diamond1.png",
            "Diamond 2": "images/diamond2.png",
            "Diamond 3": "images/diamond3.png",
            "Crimson 1": "images/crimson1.png",
            "Crimson 2": "images/crimson2.png",
            "Crimson 3": "images/crimson3.png",
            "Iridescent": "images/iridescent.png"
        };

        function applyData(data) {
            if (rankImages[data.rank]) {
                document.getElementById('rank-image').src = rankImages[data.rank];
            }

            document.getElementById('current-sr').innerText = data.currentSR ?? '0';

            const dailySrElement = document.getElementById('daily-sr');
            const dailySR = data.dailySR ?? 0;
            dailySrElement.innerText = dailySR >= 0 ? `+${dailySR}` : dailySR;
            dailySrElement.classList.toggle('positive-sr', dailySR >= 0);
            dailySrElement.classList.toggle('negative-sr', dailySR < 0);
        }

        async function fetchSRData() {
            try {
                const response = await fetch('/sr-data');
                const data = await response.json();
                applyData(data);
            } catch (err) {
                console.error('Error fetching SR data:', err);
            }
        }

        let socket;
        function connectWebSocket() {
            const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
            socket = new WebSocket(`${wsProtocol}://${location.host}`);

            socket.onmessage = function (event) {
                try {
                    applyData(JSON.parse(event.data));
                } catch (err) {
                    console.error('Error processing WebSocket message:', err);
                }
            };

            socket.onclose = () => {
                console.log('WebSocket closed, reconnecting...');
                setTimeout(connectWebSocket, 1000);
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchSRData();
            connectWebSocket();
        });
    </script>
</head>

<body>
    <div class="container">
        <img id="rank-image" class="rank-image" src="" alt="Rank Image">
        <div id="current-sr" class="sr-overlay">0</div>
        <div id="daily-sr" class="daily-sr-overlay">0</div>
    </div>
</body>

</html>
