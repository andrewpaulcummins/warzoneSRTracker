<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Rank Tracker</title>
    <style>
        body {
            background: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        @font-face {
            font-family: 'Bord';
            src: url('fonts/Bord.ttf') format('truetype');
        }

        .container {
            position: relative;
            text-align: center;
        }

        .rank-image {
            width: 100%;
            max-width: 800px;
        }

        .sr-overlay,
        .daily-sr-overlay {
            position: absolute;
            top: 46%;
            font-family: 'Bord';
            font-weight: bold;
            font-size: 31px;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(70, 1, 83, 0.7);
        }

        .sr-overlay {
            left: 42%;
        }

        .daily-sr-overlay {
            left: 68%;
        }

        .positive-sr {
            color: #00ff00; /* Bright green for positive SR */
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 255, 0, 0.7);
        }

        .negative-sr {
            color: #ff0000; /* Bright red for negative SR */
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(255, 0, 0, 0.7);
        }
    </style>

    <script>
        const rankImages = {
            "Bronze 1": "/gogzyImages/bronze1.png",
            "Bronze 2": "/gogzyImages/bronze2.png",
            "Bronze 3": "/gogzyImages/bronze3.png",
            "Silver 1": "/gogzyImages/silver1.png",
            "Silver 2": "/gogzyImages/silver2.png",
            "Silver 3": "/gogzyImages/silver3.png",
            "Gold 1": "/gogzyImages/gold1.png",
            "Gold 2": "/gogzyImages/gold2.png",
            "Gold 3": "/gogzyImages/gold3.png",
            "Platinum 1": "/gogzyImages/platinum1.png",
            "Platinum 2": "/gogzyImages/platinum2.png",
            "Platinum 3": "/gogzyImages/platinum3.png",
            "Diamond 1": "/gogzyImages/diamond1.png",
            "Diamond 2": "/gogzyImages/diamond2.png",
            "Diamond 3": "/gogzyImages/diamond3.png",
            "Crimson 1": "/gogzyImages/crimson1.png",
            "Crimson 2": "/gogzyImages/crimson2.png",
            "Crimson 3": "/gogzyImages/crimson3.png",
            "Iridescent": "/gogzyImages/iridescent.png"
        };

        async function fetchSRData() {
            try {
                const response = await fetch('/sr-data');
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

                const data = await response.json();
                console.log("Fetched SR Data:", data);

                const rankImage = document.getElementById('rank-image');
                rankImage.src = rankImages[data.rank] || "/gogzyImages/bronze1.png";

                document.getElementById('current-sr').innerText = data.currentSR ?? '0';
                const dailySRElement = document.getElementById('daily-sr');
                dailySRElement.innerText = data.dailySR ?? '0';

                // Apply correct color class
                dailySRElement.classList.remove("positive-sr", "negative-sr");
                if (data.dailySR > 0) {
                    dailySRElement.classList.add("positive-sr");
                } else if (data.dailySR < 0) {
                    dailySRElement.classList.add("negative-sr");
                }
            } catch (error) {
                console.error("Error fetching SR data:", error);
            }
        }

        let socket;
        function connectWebSocket() {
            socket = new WebSocket('wss://warzonesrtracker-7g94.onrender.com');
            // socket = new WebSocket('ws://localhost:3000');

            socket.onmessage = function (event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log("WebSocket Data Received:", data);

                    const rankImage = document.getElementById('rank-image');
                    rankImage.src = rankImages[data.rank] || "/gogzyImages/bronze1.png";

                    document.getElementById('current-sr').innerText = data.currentSR;
                    const dailySRElement = document.getElementById('daily-sr');
                    dailySRElement.innerText = data.dailySR;

                    // Apply correct color class
                    dailySRElement.classList.remove("positive-sr", "negative-sr");
                    if (data.dailySR > 0) {
                        dailySRElement.classList.add("positive-sr");
                    } else if (data.dailySR < 0) {
                        dailySRElement.classList.add("negative-sr");
                    }
                } catch (error) {
                    console.error("Error processing WebSocket message:", error);
                }
            };

            socket.onclose = () => {
                console.log('WebSocket closed, reconnecting...');
                setTimeout(connectWebSocket, 1000);
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('rank-image').src = "/gogzyImages/bronze1.png";
            fetchSRData();
            connectWebSocket();
        });
    </script>
</head>

<body>
    <div class="container">
        <img id="rank-image" class="rank-image" src="/gogzyImages/bronze1.png" alt="Rank Image">
        <div id="current-sr" class="sr-overlay">0</div>
        <div id="daily-sr" class="daily-sr-overlay">0</div>
    </div>
</body>

</html>
