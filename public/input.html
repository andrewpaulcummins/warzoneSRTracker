<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR Tracker</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #1c1c1c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #eee;
            flex-direction: column;
            text-align: center;
        }

        @font-face {
            font-family: 'Bord';
            src: url('fonts/Bord.ttf') format('truetype');
        }

        h1 {
            text-align: center;
            font-family: 'Bord';
            font-size: 2.5rem;
            color: #a200ff;
            margin: 0 auto 20px auto;
            font-weight: 600;
            text-shadow: 0 0 15px rgba(255, 143, 0, 0.8), 0 0 30px rgba(162, 0, 255, 0.6);
            display: block;
            width: 100%;
        }

        form {
            background: linear-gradient(145deg, #2b2b2b, #3a3a3a);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.8), inset 3px 3px 10px rgba(255, 143, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: left;
            border: 2px solid #a200ff;
        }

        label {
            font-family: 'Bord';
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: block;
            font-weight: 500;
            color: #ff8f00;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border: 2px solid #a200ff;
            border-radius: 8px;
            font-family: 'Bord';
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #333;
            color: #fff;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #ff8f00;
            box-shadow: 0 0 10px rgba(255, 143, 0, 0.8), 0 0 20px rgba(162, 0, 255, 0.6);
            outline: none;
        }

        button {
            background: linear-gradient(145deg, #a200ff, #ff8f00);
            color: #1c1c1c;
            border: none;
            padding: 12px 24px;
            font-family: 'Bord';
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 3px 3px 10px rgba(255, 143, 0, 0.8), inset 2px 2px 5px rgba(162, 0, 255, 0.4);
        }

        button:hover {
            background: linear-gradient(145deg, #ff8f00, #a200ff);
            transform: scale(1.05);
        }

        button:active {
            background: linear-gradient(145deg, #a200ff, #ff8f00);
            box-shadow: 2px 2px 5px rgba(255, 143, 0, 0.5);
        }

        #license-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 400px;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transform: translate(-50%, -50%);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(162, 0, 255, 0.8);
        }

        .modal-content {
            background: linear-gradient(145deg, #3a3a3a, #2b2b2b);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 5px 5px 15px rgba(255, 143, 0, 0.5), inset 3px 3px 10px rgba(162, 0, 255, 0.4);
        }

        #license-key {
            padding: 12px;
            width: 80%;
            font-size: 1.1rem;
            border: 2px solid #a200ff;
            border-radius: 8px;
            background-color: #333;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 143, 0, 0.6);
        }

        #licenseBtn {
            margin-top: 15px;
            padding: 12px 20px;
            font-size: 1.1rem;
            background: linear-gradient(145deg, #a200ff, #ff8f00);
            box-shadow: 3px 3px 10px rgba(255, 143, 0, 0.8);
        }

        #licenseBtn:hover {
            background: linear-gradient(145deg, #ff8f00, #a200ff);
        }
    </style>
</head>

<body>
    <!-- License Modal -->
    <div id="license-modal" style="display: none;">
        <div class="modal-content">
            <h2>Enter License Key</h2>
            <input type="text" id="license-key" placeholder="Enter your key" />
            <button id="licenseBtn" onclick="submitLicenseKey()">Submit</button>
            <p id="error-message" style="color: red;"></p>
        </div>
    </div>

    <!-- SR Form -->
    <div>
        <h1>Enter SR Information</h1>
        <form id="srForm">
            <label for="startSR">Starting SR:</label>
            <input type="number" id="startSR" placeholder="Enter your starting SR" required><br>

            <label for="currentSR">Current SR:</label>
            <input type="number" id="currentSR" placeholder="Enter your current SR" required><br>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        // SR Form submission handler
        const form = document.getElementById('srForm');
        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const licenseKey = localStorage.getItem('licenseKey'); // Get the stored license key
            const startSR = parseInt(document.getElementById('startSR').value);
            const currentSR = parseInt(document.getElementById('currentSR').value);

            fetch('/update-sr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ startSR, currentSR, licenseKey })
            }).then(response => {
                if (response.ok) {
                    console.log("SR data updated successfully!");
                } else {
                    console.error("Error updating SR data.");
                }

                document.getElementById('currentSR').value = ''; // Clears the currentSR input field
            });
        });

        // Check if license is already stored
        window.onload = async () => {
            const storedLicenseKey = localStorage.getItem('licenseKey');

            if (storedLicenseKey) {
                // License key is already stored, skip the modal
                return;
            }

            // Show the modal if no valid license is stored
            document.getElementById('license-modal').style.display = 'block';
        };

        // Submit the license key to the server
        async function submitLicenseKey() {
            const licenseKey = document.getElementById('license-key').value;
            const errorMessage = document.getElementById('error-message');

            if (!licenseKey) {
                errorMessage.innerText = "Please enter a valid license key!";
                return;
            }

            try {
                const response = await fetch('/validate-license', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ licenseKey })
                });

                const data = await response.json();

                if (data.valid) {
                    // Store the license key in localStorage so the user doesn't have to enter it again
                    localStorage.setItem('licenseKey', licenseKey);

                    // Close the modal
                    document.getElementById('license-modal').style.display = 'none';
                } else {
                    errorMessage.innerText = data.message || "Invalid license key!";
                }
            } catch (err) {
                console.error(err);
                errorMessage.innerText = "An error occurred. Please try again later.";
            }
        }

    </script>
</body>

</html>
