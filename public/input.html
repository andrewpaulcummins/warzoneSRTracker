<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR Tracker</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #1c1c1c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #eee;
            flex-direction: column;
            text-align: center;
        }

        @font-face {
            font-family: 'GOOD BRUSH';
            src: url('fonts/GOOD BRUSH.TTF') format('ttf');
        }

        h1 {
            text-align: center;
            font-family: 'GOOD BRUSH';
            font-size: 2.5rem;
            color: #00f7ff;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        form {
            background: #2b2b2b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 400px;
            text-align: left;
            border: 2px solid #444;
        }

        label {
            font-family: 'GOOD BRUSH';
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: block;
            font-weight: 500;
            color: #f1f1f1;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border: 2px solid #444;
            border-radius: 8px;
            font-family: 'GOOD BRUSH';
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #333;
            color: #fff;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #00f7ff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
            outline: none;
        }

        button {
            background-color: #00f7ff;
            color: #1c1c1c;
            border: none;
            padding: 12px 24px;
            font-family: 'GOOD BRUSH';
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #00a8b8;
            transform: scale(1.05);
        }

        button:active {
            background-color: #008e9e;
        }
    </style>
</head>

<body>

    <div>
        <h1>Enter SR Information</h1>
        <form id="srForm">
            <label for="licenseKey">License Key:</label>
            <input type="text" id="licenseKey" placeholder="Enter your license key" required><br>

            <label for="startSR">Starting SR:</label>
            <input type="number" id="startSR" placeholder="Enter your starting SR" required><br>

            <label for="currentSR">Current SR:</label>
            <input type="number" id="currentSR" placeholder="Enter your current SR" required><br>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('srForm');
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const licenseKey = document.getElementById('licenseKey').value;
            const startSR = parseInt(document.getElementById('startSR').value);
            const currentSR = parseInt(document.getElementById('currentSR').value);

            fetch('/update-sr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ startSR, currentSR, licenseKey })
            }).then(response => {
                if (response.ok) {
                    console.log("SR data updated successfully!");
                } else {
                    console.error("Error updating SR data.");
                }
                
                // Clear the 'currentSR' field after submitting
                document.getElementById('currentSR').value = ''; // Clears the input field
            });
        });
    </script>
</body>

</html>
