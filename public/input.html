<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR Tracker</title>
</head>
<body>
    <h1>Enter SR Information</h1>
    <form id="srForm">
        <label for="licenseKey">License Key:</label>
        <input type="text" id="licenseKey" required><br><br>

        <label for="startSR">Starting SR:</label>
        <input type="number" id="startSR" required><br><br>

        <label for="currentSR">Current SR:</label>
        <input type="number" id="currentSR" required><br><br>

        <button type="submit">Submit</button>
    </form>

    <script>
        const form = document.getElementById('srForm');
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const licenseKey = document.getElementById('licenseKey').value;
            const startSR = parseInt(document.getElementById('startSR').value);
            const currentSR = parseInt(document.getElementById('currentSR').value);

            fetch('/update-sr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ startSR, currentSR, licenseKey })
            }).then(response => {
                if (response.ok) {
                    alert("SR data updated successfully!");
                } else {
                    alert("Error updating SR data.");
                }
            });
        });
    </script>
</body>
</html>
